pattern: |
  When an agent is about to bypass a failing quality check:
  - DON'T: weaken the lint/format/typecheck config
  - DON'T: add `// eslint-disable-next-line` without a written justification
  - DO: fix the code so the original rule passes
rationale: |
  Seed instinct shipped with the framework. The config-protection hook
  enforces this at the tool-call level (agents cannot edit .eslintrc etc.),
  but the instinct system tracks whether the PATTERN repeats across sessions.
