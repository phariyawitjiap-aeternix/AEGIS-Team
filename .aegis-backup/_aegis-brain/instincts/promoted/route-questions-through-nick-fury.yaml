id: route-questions-through-nick-fury
status: promoted
confidence: 1.0
observations: 999
first_seen: 2026-04-08
last_reinforced: 2026-04-08
cluster: governance
pattern: |
  Non-Nick-Fury agents MUST NOT ask the human questions directly.
  All questions route through Nick Fury via QUESTION_TO_BRAIN format.
  Nick Fury answers from brain/instincts/ADRs/policy/judgment first,
  and only escalates to the human when the question falls into one
  of four allowed categories: Identity (P10), Irreversible scope,
  External access (keys/creds), or Explicit approval gate.
rationale: |
  Seed instinct shipped with AEGIS v8.4. Enforces the Master Brain Protocol
  documented in .claude/agents/nick-fury.md and .claude/references/context-rules.md.
  Fixes the "team asks human too often" friction point observed in pre-v8.4 sessions.
  Loki auto-REJECTs any spec/response that has an agent asking the human directly.
